<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MUZ HUB - Games</title>

<meta name="description" content="Play free online games on MUZ HUB">

<link rel="icon" type="image/png" href="images/favicon.png">

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>


<div class="logo">
MUZ <span>HUB</span>
</div>


<div class="menu-btn" onclick="toggleMenu()">
☰
</div>


<nav id="navMenu">

<a href="index.html">Home</a>
<a href="tools.html">Tools</a>
<a href="games.html">Games</a>
<a href="blog.html">Blog</a>

</nav>


</header>





<section class="hero">

<h1>
🎮 Online Games
</h1>


<p>
Play fun games for free
</p>


<input 
id="gameSearch"
type="text"
placeholder="Search games..."
>


</section>





<section class="cards">



<div class="card">

<h2>❌⭕ Tic Tac Toe</h2>

<p>
Classic X and O game.
</p>


<a href="games/tic-tac-toe.html">

<button>
Play Now
</button>

</a>

</div>





<div class="card">

<h2>🧠 Memory Game</h2>

<p>
Match the same symbols.
</p>


<a href="games/memory-game.html">

<button>
Play Now
</button>

</a>

</div>





<div class="card">

<h2>🐍 Snake Game</h2>

<p>
Control the snake and collect points.
</p>


<a href="games/snake.html">

<button>
Play Now
</button>

</a>

</div>



</section>





<footer>

<p>
© 2026 MUZ HUB. All Rights Reserved.
</p>

</footer>





<script>


function toggleMenu(){

document
.getElementById("navMenu")
.classList.toggle("active");

}



let search =
document.getElementById("gameSearch");


search.addEventListener("keyup",function(){


let value =
search.value.toLowerCase();



document.querySelectorAll(".card").forEach(card=>{


card.style.display =
card.innerText.toLowerCase().includes(value)
?
"block"
:
"none";


});


});


</script>



</body>

</html>
